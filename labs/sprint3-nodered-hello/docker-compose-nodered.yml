services:
  mosquitto:
    build: ./mosquitto
    container_name: nodered-mosquitto
    ports:
      - "1883:1883"
    networks:
      - nodered-network

  node-red:
    image: nodered/node-red:latest
    container_name: nodered-app
    user: "0"
    ports:
      - "1880:1880"
    volumes:
      - ./nodered/data:/data
    networks:
      - nodered-network
    environment:
      - TZ=America/Sao_Paulo

networks:
  nodered-network:
    driver: bridge
